<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0" stop-color="#10384f"/>
      <stop offset="60%" stop-color="#0a1f2c"/>
      <stop offset="100%" stop-color="#060e15"/>
    </radialGradient>
    <linearGradient id="plane" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#3bf5b2"/>
      <stop offset="1" stop-color="#46c2ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="15" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <g transform="rotate(-22 256 218)">
    <g filter="url(#glow)">
      <path d="M150 218 H92" stroke="#3bf5b2" stroke-opacity="0.6" stroke-width="11"
            stroke-linecap="round" stroke-dasharray="0.1 28"/>
      <path d="M170 287 L342 218 L230 218 Z" fill="#1f9fd6"/>
      <path d="M170 149 L342 218 L230 218 Z" fill="url(#plane)"/>
    </g>
  </g>

  <text x="256" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="700"
        fill="#e8f6ff" text-anchor="middle" letter-spacing="1">AvEng</text>
</svg>
